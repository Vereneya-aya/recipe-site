{% extends "recipe_app/base.html" %}

{% block title %}Update Recipe{% endblock %}

{% block content %}
  <h2>Edit Recipe</h2>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{% url 'recipe_app:recipe_detail' form.instance.pk %}" class="btn btn-secondary">Cancel</a>
  </form>
{% endblock %}
