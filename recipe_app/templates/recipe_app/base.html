<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Recipes{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-ENjdO4Dr2bkBIFxQpeoVj84nO/lkI6L35cA6MeR3PpL0I8lGpGFF93hXpG5KkNQ/" crossorigin="anonymous">

    {% block extra_head %}{% endblock %}
</head>
<body>
<header class="bg-primary text-white py-3 mb-4">
    <div class="container">
        <h1 class="h2">My Recipe Website</h1>
        <!-- Можно добавить навигацию позже -->
    </div>
</header>

<main class="container">
    {% block content %}{% endblock %}
</main>

<footer class="text-center mt-5 py-3 bg-light text-muted">
    {% if time_running %}
        <small>Page generated in {{ time_running }} sec.</small>
    {% endif %}
</footer>

<!-- Bootstrap JS Bundle (Popper included) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-HoA8zCkC2h2kgR/0e5k+Ftv7H2ZW+tQCC9uRQZMzFk+aOHD0+aBoMfE9U/jdAqnA"
        crossorigin="anonymous"></script>

{% block extra_js %}{% endblock %}
</body>
</html>
