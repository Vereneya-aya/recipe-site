{% extends "recipe_app/base.html" %}

{% block content %}
  <h2>Delete Recipe</h2>
  <p>Are you sure you want to delete the recipe: <strong>{{ object.name }}</strong>?</p>

  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'recipe_app:recipe_detail' object.pk %}" class="btn btn-secondary">Cancel</a>
  </form>
{% endblock %}
